version: "3.8"

services:
  orchid-ranker:
    build: ../..
    ports:
      - "8000:8000"   # Application
      - "9090:9090"   # Prometheus metrics
      - "8081:8081"   # Health checks
    environment:
      - ORCHID_LOG_LEVEL=DEBUG
    networks:
      - orchid-network
    healthcheck:
      test: ["GET", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      orchid-ranker:
        condition: service_healthy
    networks:
      - orchid-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=orchid
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/orchid-ranker-dashboard.json:/etc/grafana/provisioning/dashboards/orchid-ranker.json
      - ./grafana-provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana-provisioning/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - orchid-network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  orchid-network:
    driver: bridge
