global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'orchid-ranker-local'
    environment: 'development'

scrape_configs:
  - job_name: 'orchid-ranker'
    static_configs:
      - targets: ['orchid-ranker:9090']
    scrape_interval: 5s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
