apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchid-ranker.fullname" . }}
  labels:
    {{- include "orchid-ranker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "orchid-ranker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orchid-ranker.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: orchid-ranker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
            {{- end }}
            - containerPort: {{ .Values.health.port }}
              name: health
          args:
            - "--port={{ .Values.service.port }}"
            - "--health-port={{ .Values.health.port }}"
            {{- if .Values.metrics.enabled }}
            - "--metrics-port={{ .Values.metrics.port }}"
            {{- else }}
            - "--no-metrics"
            {{- end }}
          env:
            - name: ORCHID_LOG_LEVEL
              value: {{ .Values.env.ORCHID_LOG_LEVEL | quote }}
            - name: ORCHID_AUDIT_ENDPOINT
              value: {{ .Values.env.ORCHID_AUDIT_ENDPOINT | quote }}
            {{- if or .Values.secrets.existingSecret .Values.secrets.auditApiKey }}
            - name: ORCHID_AUDIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-secrets" (include "orchid-ranker.fullname" .)) .Values.secrets.existingSecret }}
                  key: auditApiKey
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
