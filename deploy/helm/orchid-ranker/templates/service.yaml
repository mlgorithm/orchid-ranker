apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchid-ranker.fullname" . }}
  labels:
    {{- include "orchid-ranker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
    {{- end }}
  selector:
    {{- include "orchid-ranker.selectorLabels" . | nindent 4 }}
