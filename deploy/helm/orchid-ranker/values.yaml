replicaCount: 1

image:
  repository: ghcr.io/your-org/orchid-ranker
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

env:
  ORCHID_LOG_LEVEL: INFO
  ORCHID_AUDIT_ENDPOINT: ""
  ORCHID_AUDIT_API_KEY: ""

metrics:
  enabled: true
  port: 9090

health:
  port: 8081

# -- Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- Liveness and readiness probes
probes:
  liveness:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
