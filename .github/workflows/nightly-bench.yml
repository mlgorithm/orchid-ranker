name: Nightly Benchmarks

on:
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 3am UTC
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,benchmarks]"

      - name: Run adaptive-learning credibility smoke benchmark
        run: |
          PYTHONPATH=src python benchmarks/adaptive_efficiency_benchmark.py \
            --data benchmarks/fixtures/assistments_tiny_raw.csv \
            --user-col user_id \
            --item-col problem_id \
            --correct-col correct \
            --timestamp-col order_id \
            --concept-col skill_id \
            --models akt \
            --seeds 11 \
            --policy-targets 0.70 \
            --policy-rewards progression \
            --candidate-size 3 \
            --max-events 20 \
            --max-rows 20 \
            --epochs 1 \
            --d-model 8 \
            --n-heads 2 \
            --batch-size 4 \
            --output benchmarks/golden/adaptive_smoke.json \
            --report-md benchmarks/golden/adaptive_smoke.md

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmarks/golden/
          retention-days: 90
