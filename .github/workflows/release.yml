name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Release preflight
        run: |
          python - <<'PY'
          import importlib.metadata
          import tomllib
          from pathlib import Path

          import orchid_ranker

          tag_version = "${{ github.ref_name }}".removeprefix("v")
          project_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          package_version = importlib.metadata.version("orchid-ranker")
          versions = {tag_version, project_version, package_version, orchid_ranker.__version__}
          if len(versions) != 1:
              raise SystemExit(
                  "release version mismatch: "
                  f"tag={tag_version}, pyproject={project_version}, "
                  f"metadata={package_version}, __version__={orchid_ranker.__version__}"
              )
          PY
          python -m pytest tests/test_publish_readiness.py -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: orchid-ranker-sbom.spdx.json
          output-file: dist/orchid-ranker-sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/orchid-ranker-sbom.spdx.json

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/orchid-ranker
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    needs: [build, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocstrings[python] mike

      - name: Deploy versioned docs
        run: |
          git fetch origin gh-pages --depth=1 || true
          VERSION=${GITHUB_REF_NAME#v}
          mike deploy --push --update-aliases $VERSION latest
