name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run targeted unit tests
        run: python -m pytest tests/test_native_scoring.py tests/test_safe_switch.py

      - name: Run ML100K safe smoke scenario
        run: ./scripts/ci_safe_smoke.sh runs/ci-safe-smoke
