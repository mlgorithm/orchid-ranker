name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run ruff linting
        run: python -m ruff check src/

      - name: Run mypy type checking on hardened core modules
        run: |
          python -m mypy \
            src/orchid_ranker/recommender.py \
            src/orchid_ranker/model_selection.py \
            src/orchid_ranker/evaluation.py \
            src/orchid_ranker/serialization.py \
            --ignore-missing-imports \
            --follow-imports=silent

      - name: Run full test suite with coverage
        run: |
          python -m pytest tests/ -x --tb=short \
            --cov=orchid_ranker --cov-report=term-missing \
            --cov-fail-under=45

      - name: Build documentation
        run: python -m mkdocs build --strict

  install-contracts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        contract: ["base", "ml", "implicit"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install package for ${{ matrix.contract }} contract
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.contract }}" in
            base)
              python -m pip install .
              ;;
            ml)
              python -m pip install ".[ml]"
              ;;
            implicit)
              python -m pip install ".[implicit]"
              ;;
          esac

      - name: Smoke base install
        if: matrix.contract == 'base'
        run: |
          python - <<'PY'
          import orchid_ranker
          from orchid_ranker import BayesianKnowledgeTracing, ProgressionRecommender

          assert orchid_ranker.__version__
          assert BayesianKnowledgeTracing().p_known >= 0.0
          assert ProgressionRecommender is not None
          try:
              from orchid_ranker import OrchidRecommender  # noqa: F401
          except ImportError as exc:
              assert "requires PyTorch" in str(exc)
          else:
              raise AssertionError("base install unexpectedly exposed OrchidRecommender")
          PY

      - name: Smoke ML install
        if: matrix.contract == 'ml'
        run: |
          python examples/quickstart.py
          orchid-evaluate \
            --train examples/data/quickstart_train.csv \
            --test examples/data/quickstart_test.csv \
            --strategy "als,epochs=1" \
            --top-k 5

      - name: Smoke implicit install
        if: matrix.contract == 'implicit'
        run: |
          python - <<'PY'
          import pandas as pd
          from orchid_ranker import OrchidRecommender

          interactions = pd.DataFrame({
              "user_id": [1, 1, 2, 2, 3, 3],
              "item_id": [10, 11, 10, 12, 11, 13],
              "label": [1, 1, 1, 1, 1, 1],
          })
          rec = OrchidRecommender(strategy="implicit_als", factors=4, iterations=1)
          rec.fit(interactions, rating_col="label")
          assert rec.recommend(user_id=1, top_k=1)
          PY

  lower-bounds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lower-bound dependency set
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ml]" \
            "numpy==1.23.5" \
            "pandas==1.5.3" \
            "scikit-learn==1.2.2" \
            "scipy==1.9.3" \
            "pyyaml==6.0" \
            "joblib==1.2.0" \
            "torch==2.0.1"

      - name: Smoke lower-bound recommender path
        run: |
          python - <<'PY'
          import joblib
          import numpy
          import pandas as pd
          import scipy
          import sklearn
          import torch
          import yaml

          from orchid_ranker import OrchidRecommender

          assert numpy.__version__ == "1.23.5"
          assert pd.__version__ == "1.5.3"
          assert sklearn.__version__ == "1.2.2"
          assert scipy.__version__ == "1.9.3"
          assert yaml.__version__ == "6.0"
          assert joblib.__version__ == "1.2.0"
          assert torch.__version__.startswith("2.0.1")

          interactions = pd.DataFrame({
              "user_id": [1, 1, 2, 2, 3, 3],
              "item_id": [10, 11, 10, 12, 11, 13],
              "label": [1, 0, 1, 1, 0, 1],
          })
          rec = OrchidRecommender(strategy="als", epochs=1, embedding_dim=4)
          rec.fit(interactions, rating_col="label")
          assert rec.recommend(user_id=1, top_k=1)
          PY

  build-distribution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and check distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "twine>=6,<7"
          python -m build
          python -m twine check dist/*

      - name: Inspect wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("*.whl"))
          names = set(zipfile.ZipFile(wheel).namelist())
          required = {
              "orchid_ranker/py.typed",
              "orchid_ranker/native/fast_score.cpp",
          }
          missing = sorted(required - names)
          if missing:
              raise AssertionError(f"Wheel is missing required package data: {missing}")
          PY
