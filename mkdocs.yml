site_name: Orchid Ranker
site_description: Progression-aware recommender that optimises long-term user value.
site_url: https://mlgorithm.github.io/orchid-ranker/
repo_url: https://github.com/mlgorithm/orchid-ranker
repo_name: mlgorithm/orchid-ranker
edit_uri: edit/main/docs/
exclude_docs: |
  README.md
  application-scenarios.md
  benchmarking.md
  benchmarking_results.md
  core-vs-specialty.md
  benchmarks/
  roadmap/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Why Orchid: why-orchid.md
  - Competitors: competitors.md
  - Usage scenarios: scenarios.md
  - Getting started:
    - Quickstart: quickstart.md
    - Overview: overview.md
    - "Guide 1: Fit offline": guides/01-fit-offline.md
    - "Guide 2: Serve streaming": guides/02-serve-streaming.md
    - "Guide 3: Operate safely": guides/03-operate-safely.md
    - Migration (0.4 to 0.5): guides/migration-0.4-to-0.5.md
  - Reference:
    - API overview: api_reference.md
    - Enterprise runbook: enterprise_runbook.md
    - Security threat model: security/threat_model.md
    - External review packet: security/external_review_packet.md
    - FERPA / GDPR alignment: compliance/ferpa_gdpr_alignment.md
  - Tutorials:
    - Library walkthrough: tutorials/library_walkthrough.md
    - Safe mode: tutorial_safe_mode.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

extra:
  version:
    provider: mike
